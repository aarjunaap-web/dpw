<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display</title>

    <style>
        p {
            background-color: lightblue;
            border: 1px solid black;
            padding: 10px;
        }

        p.inline {
            display: inline;
        }

        p.block {
            display: block;
        }

        p.inlineblock {
            display: inline-block;
            width: 200px;
        }

        p.none {
            display: none;
        }
    </style>
</head>

<body>

    <h2>Contoh Display</h2>

    <p class="block">Display block (default)</p>

    <p class="inline">Display inline 1</p>
    <p class="inline">Display inline 2</p>

    <br><br>

    <p class="inlineblock">Inline-block 1</p>
    <p class="inlineblock">Inline-block 2</p>

    <p class="none">Paragraf ini tidak terlihat</p>

    <p>
        Kesimpulan: Properti display digunakan untuk mengatur cara elemen ditampilkan,
        seperti block, inline, inline-block, atau none.
    </p>

</body>
</html>
