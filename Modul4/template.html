<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Template Web</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        header {
            background-color: #666;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            float: left;
            width: 25%;
            height: 300px;
            background: #ccc;
            padding: 20px;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            margin: 10px 0;
        }

        article {
            float: left;
            width: 75%;
            padding: 20px;
            background-color: #f1f1f1;
            height: 300px;
        }

        section::after {
            content: "";
            display: table;
            clear: both;
        }

        footer {
            background-color: #777;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h2>Website Sederhana</h2>
</header>

<section>

    <nav>
        <ul>
            <li><a href="#">Menu 1</a></li>
            <li><a href="#">Menu 2</a></li>
            <li><a href="#">Menu 3</a></li>
        </ul>
    </nav>

    <article>
        <h1>Judul Konten</h1>
        <p>
            Ini adalah contoh tampilan website menggunakan HTML dan CSS.
        </p>
        <p>
            Layout ini terdiri dari header, menu, konten, dan footer.
        </p>
    </article>

</section>

<footer>
    <p>@juna_253307052_2026</p>
</footer>

</body>
</html>
