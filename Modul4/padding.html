<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Padding</title>

    <style>
        p {
            background-color: lightgreen;
            border: 2px solid black;
        }

        p.satu {
            padding-top: 20px;
        }

        p.dua {
            padding-right: 20px;
        }

        p.tiga {
            padding-bottom: 20px;
        }

        p.empat {
            padding-left: 20px;
        }

        p.lima {
            padding: 20px;
        }
    </style>
</head>

<body>

    <h2>Contoh Padding</h2>

    <p class="satu">Padding atas (top)</p>
    <p class="dua">Padding kanan (right)</p>
    <p class="tiga">Padding bawah (bottom)</p>
    <p class="empat">Padding kiri (left)</p>
    <p class="lima">Padding semua sisi</p>

    <p>
        Kesimpulan: Padding digunakan untuk mengatur jarak dalam antara isi elemen dan border.
    </p>

</body>
</html>
