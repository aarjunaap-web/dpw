<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Margin</title>

    <style>
        p {
            background-color: lightblue;
            border: 1px solid black;
        }

        p.satu {
            margin-top: 50px;
        }

        p.dua {
            margin-right: 50px;
        }

        p.tiga {
            margin-bottom: 50px;
        }

        p.empat {
            margin-left: 50px;
        }

        p.lima {
            margin: 50px;
        }
    </style>
</head>

<body>

    <h2>Contoh Margin</h2>

    <p class="satu">Margin atas (top)</p>
    <p class="dua">Margin kanan (right)</p>
    <p class="tiga">Margin bawah (bottom)</p>
    <p class="empat">Margin kiri (left)</p>
    <p class="lima">Margin semua sisi</p>

    <p>
        Kesimpulan: Margin digunakan untuk mengatur jarak luar antar elemen.
        Margin dapat diatur per sisi atau sekaligus.
    </p>

</body>
</html>
