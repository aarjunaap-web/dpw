<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Border Style</title>

    <style>
        p.solid {
            border: 2px solid black;
        }

        p.dotted {
            border: 2px dotted red;
        }

        p.dashed {
            border: 2px dashed blue;
        }

        p.double {
            border: 4px double green;
        }

        p.round {
            border: 2px solid black;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h2>Contoh Border Style</h2>

    <p class="solid">Border solid</p>
    <p class="dotted">Border dotted</p>
    <p class="dashed">Border dashed</p>
    <p class="double">Border double</p>
    <p class="round">Border dengan sudut melengkung</p>

    <p>
        Kesimpulan: Border digunakan untuk memberi garis pada elemen.
        Terdapat berbagai jenis border seperti solid, dotted, dashed, dan double.
    </p>

</body>
</html>
