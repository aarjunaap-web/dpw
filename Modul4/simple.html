<!DOCTYPE html>
<html>
<head>
    <title>Belajar Simple Selector</title>
    <style>
        p {
            text-align: center;
            color: aqua;
            border: 1px solid black;
            padding: 10px;
        }

        #kalimat {
            text-align: left;
            color: red;
        }

        .center {
            text-align: center;
            color: chocolate;
        }

        p.tengah {
            text-align: center;
            color: darkmagenta;
            display: block;
            background-color: #777777;
        }
    </style>
</head>

<body>

    <p>Paragraf biasa</p>
    <p id="kalimat">Paragraf dengan ID</p>
    <p class="center">Paragraf dengan class</p>
    <p class="tengah">Paragraf kombinasi</p>

</body>
</html>
