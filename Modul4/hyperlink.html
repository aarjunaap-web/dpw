<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperlink CSS</title>

    <style>
        a:link {
            color: blue;
            text-decoration: none;
        }

        a:visited {
            color: purple;
        }

        a:hover {
            color: red;
            text-decoration: underline;
        }

        a:active {
            color: green;
        }

        a {
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <h2>Contoh Hyperlink dengan CSS</h2>

    <p>
        <a href="#">Klik link ini</a>
    </p>

    <p>
        Kesimpulan: Hyperlink dapat diubah tampilannya menggunakan CSS,
        seperti warna, garis bawah, dan huruf kapital.
    </p>

</body>
</html>
