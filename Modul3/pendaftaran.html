<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Pendaftaran</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="author" content="Arjuna AP">
    <meta name="nim" content="253307052">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 15px;
        }

        label {
            display: inline-block;
            width: 150px;
            margin-bottom: 10px;
        }

        input {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h1>Form Penjadwal Pertemuan</h1>

<form>

    <!-- INFORMASI PRIBADI -->
    <fieldset>
        <legend>Informasi Pribadi</legend>

        <label>Nama:</label>
        <input type="text" required><br>

        <label>No. Telepon:</label>
        <input type="tel" pattern="[0-9]{4}-[0-9]{6}" placeholder="0812-123456" required><br>

        <label>Email:</label>
        <input type="email" required><br>

        <label>Tanggal Lahir:</label>
        <input type="date" min="1987-01-01" max="1993-01-01" required><br>
    </fieldset>

    <!-- PERMINTAAN -->
    <fieldset>
        <legend>Permintaan Pertemuan</legend>

        <label>Tujuan:</label>
        <input type="text" required><br>

        <label>Tingkat Kepentingan:</label>
        <input type="range" min="0" max="10"><br>

        <label>Tanggal:</label>
        <input type="date" min="2026-01-01" required><br>

        <label>Waktu:</label>
        <input type="time" min="17:00" max="21:00" required><br>
    </fieldset>

    <input type="submit" value="Submit">

</form>

<p>
Kesimpulan: Form HTML5 memiliki validasi otomatis seperti email, tanggal,
dan pola input. Hal ini memudahkan pengguna dan meningkatkan keamanan data.
</p>

</body>
</html>
