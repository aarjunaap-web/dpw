<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Belajar Box Model</title>

    <style>
        div {
            width: 300px;
            padding: 25px;
            margin: 30px;
            border: 10px solid green;
            background-color: lightgray;
        }
    </style>
</head>

<body>

    <div>
        Teks ini berada pada box dengan menggunakan div. 
        Saya telah menambahkan padding 25px, margin 30px dan 
        border solid berwarna hijau.
    </div>

    <img src="gambar/img1.png" style="width: 500px">

    <p>
        Kesimpulan: Box model terdiri dari content, padding, border, dan margin 
        yang digunakan untuk mengatur ukuran dan jarak elemen.
    </p>

</body>
</html>
