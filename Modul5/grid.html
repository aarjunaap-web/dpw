<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Belajar Grid</title>

    <style>
        body {
            font-family: Arial;
        }

        .grid-container {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: lightgray;
            padding: 10px;
        }

        .grid-item {
            background-color: lightblue;
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">CSS Grid Layout</h2>

    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
    </div>

    <p style="text-align:center;">
        Kesimpulan: CSS Grid digunakan untuk membuat layout berbasis baris dan kolom 
        secara fleksibel dan rapi dalam satu waktu.
    </p>

</body>
</html>
